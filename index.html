<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नैनकला भजन मण्डली</title>
    <style>
        :root { --orange: #FF9933; --red: #FF0000; --gold: #FFD700; --bg: #FFF5E1; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg); margin: 0; text-align: center; }
        .hidden { display: none; }
        .symbol { font-size: 24px; color: var(--red); padding: 10px; }
        header { background: var(--orange); color: white; padding: 20px; border-bottom: 5px solid var(--gold); position: relative; }
        .profile-circle { width: 140px; height: 140px; margin: 10px auto; border-radius: 50%; border: 4px solid white; overflow: hidden; background: #fff; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        section { background: white; margin: 15px auto; padding: 20px; width: 90%; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section-title { background: var(--gold); padding: 8px; margin-bottom: 15px; font-weight: bold; border-radius: 5px; }
        .rule-row { display: flex; align-items: center; margin-bottom: 8px; text-align: left; }
        .rule-input { width: 85%; padding: 5px; border: none; font-size: 16px; outline: none; }
        .member-card { background: #fff; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        #member-list, #leader-list { display: grid; grid-template-columns: repeat(1, 1fr); gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-add { background: #28a745; } .btn-save { background: #007bff; } .btn-logout { background: #dc3545; position: absolute; right: 10px; top: 10px; }
        .pdf-item { background: #f9f9f9; padding: 8px; margin-bottom: 5px; border-left: 4px solid var(--red); text-align: left; }
        #gallery-display img { width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-screen" style="padding: 100px 20px; background: var(--orange); color: white; min-height: 100vh;">
    <div class="profile-circle">
        <img id="login-grandma" src="https://via.placeholder.com/150">
    </div>
    <h2>नैनकला भजन मण्डली</h2>
    <input type="text" id="username" placeholder="Username" style="padding:10px; margin:5px;"><br>
    <input type="password" id="password" placeholder="Password" style="padding:10px; margin:5px;"><br>
    <button class="btn btn-save" onclick="checkLogin()">भित्र जानुहोस्</button>
</div>

<div id="main-content" class="hidden">
    <header>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
        <div class="profile-circle">
            <img src="https://via.placeholder.com/150">
        </div>
        <h1>नैनकला भजन मण्डली</h1>
        <p>गोदावरी-१, अत्तरिया, कैलाली (२०८३)</p>
    </header>

    <div id="admin-panel" class="hidden" style="background:#fff3f3; padding:10px; border:2px solid red; margin:10px;">
        <button class="btn btn-add" onclick="addP('leader')">पदाधिकारी +</button>
        <button class="btn btn-add" onclick="addP('member')">सदस्य +</button>
    </div>

    <section>
        <div class="section-title">आचारसंहिता</div>
        <div id="rules">
            <div class="rule-row">१. <input type="text" class="rule-input" placeholder="यहाँ नियम लेख्नुहोस्..." onchange="saveRules()"></div>
        </div>
        <button id="add-rule-btn" class="btn btn-add hidden" onclick="addBlankRule()">नयाँ नियम थप्नुहोस्</button>
    </section>

    <section>
        <div class="section-title">कार्यक्रमहरू (PDF)</div>
        <div id="pdf-list"></div>
        <input type="file" id="pdf-in" accept="application/pdf" class="hidden" onchange="addPdf(this)">
        <button id="pdf-btn" class="btn btn-add hidden" onclick="document.getElementById('pdf-in').click()">PDF थप्नुहोस्</button>
    </section>

    <section>
        <div class="section-title">पदाधिकारी तथा सदस्यहरू</div>
        <div id="leader-list"></div>
        <div id="member-list"></div>
    </section>

    <section>
        <div class="section-title">मिडिया (फोटो/भिडियो)</div>
        <div id="gallery-display"></div>
        <div id="media-btns" class="hidden">
            <input type="file" id="f-in" accept="image/*" class="hidden" onchange="upMedia(this)">
            <button class="btn btn-add" onclick="document.getElementById('f-in').click()">फोटो थप्नुहोस्</button>
        </div>
    </section>
</div>

<script>
    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u==='admin' && p==='admin123') { localStorage.setItem('role', 'admin'); location.reload(); }
        else if(u==='user' && p==='user123') { localStorage.setItem('role', 'user'); location.reload(); }
        else alert("मिलेन!");
    }

    function logout() { localStorage.removeItem('role'); location.reload(); }

    window.onload = function() {
        const role = localStorage.getItem('role');
        if(role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if(role==='admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('add-rule-btn').classList.remove('hidden');
                document.getElementById('pdf-btn').classList.remove('hidden');
                document.getElementById('media-btns').classList.remove('hidden');
            }
            loadData();
        }
    }

    function addP(t) {
        const name = prompt("नाम लेख्नुहोस्:");
        const post = prompt("पद लेख्नुहोस्:");
        if(name) {
            const html = `<div class="member-card"><div><strong>${name}</strong><br><small>${post}</small></div></div>`;
            document.getElementById(t + '-list').insertAdjacentHTML('beforeend', html);
            saveSection(t + '-list');
        }
    }

    function addBlankRule() {
        const div = document.createElement('div');
        div.className = "rule-row";
        div.innerHTML = `✔️ <input type="text" class="rule-input" onchange="saveRules()">`;
        document.getElementById('rules').appendChild(div);
    }

    function upMedia(input) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                const img = `<img src="${e.target.result}">`;
                document.getElementById('gallery-display').insertAdjacentHTML('beforeend', img);
                saveSection('gallery-display');
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function addPdf(input) {
        if (input.files[0]) {
            const html = `<div class="pdf-item">📄 ${input.files[0].name}</div>`;
            document.getElementById('pdf-list').insertAdjacentHTML('beforeend', html);
            saveSection('pdf-list');
        }
    }

    // डाटा सेभ गर्ने (LocalStorage)
    function saveSection(id) { localStorage.setItem(id, document.getElementById(id).innerHTML); }
    function saveRules() { 
        const rules = Array.from(document.querySelectorAll('.rule-input')).map(i => i.value);
        localStorage.setItem('savedRules', JSON.stringify(rules));
    }

    function loadData() {
        ['leader-list', 'member-list', 'pdf-list', 'gallery-display'].forEach(id => {
            if(localStorage.getItem(id)) document.getElementById(id).innerHTML = localStorage.getItem(id);
        });
        const rules = JSON.parse(localStorage.getItem('savedRules') || "[]");
        if(rules.length > 0) {
            document.getElementById('rules').innerHTML = rules.map(r => `<div class="rule-row">✔️ <input type="text" class="rule-input" value="${r}" onchange="saveRules()"></div>`).join('');
        }
    }
</script>
</body>
</html>
