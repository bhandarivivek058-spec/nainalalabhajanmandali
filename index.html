<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नैनकला भजन मण्डली</title>
    <style>
        :root { --orange: #FF9933; --red: #FF0000; --gold: #FFD700; --bg: #FFF5E1; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg); margin: 0; text-align: center; }
        .hidden { display: none; }
        header { background: var(--orange); color: white; padding: 20px; border-bottom: 5px solid var(--gold); position: relative; }
        .profile-circle { width: 140px; height: 140px; margin: 10px auto; border-radius: 50%; border: 4px solid white; overflow: hidden; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        section { background: white; margin: 15px auto; padding: 20px; width: 90%; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section-title { background: var(--gold); padding: 8px; margin-bottom: 15px; font-weight: bold; border-radius: 5px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-save { background: #007bff; } .btn-logout { background: #dc3545; position: absolute; right: 10px; top: 10px; }
        .btn-add { background: #28a745; }
        #gallery-grid img { width: 140px; height: 140px; object-fit: cover; margin: 5px; border-radius: 8px; border: 2px solid var(--gold); }
        .rule-item { text-align: left; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="login-screen" style="padding-top: 50px;">
    <div class="profile-circle">
        <img id="grandma-photo" src="https://via.placeholder.com/150" alt="Hajurama">
    </div>
    <h2>नैनकला भजन मण्डली</h2>
    <div style="background: white; padding: 20px; width: 80%; margin: auto; border-radius: 10px;">
        <input type="text" id="username" placeholder="Username" style="width: 90%; padding: 10px; margin: 5px;"><br>
        <input type="password" id="password" placeholder="Password" style="width: 90%; padding: 10px; margin: 5px;"><br>
        <button class="btn btn-save" onclick="checkLogin()">भित्र जानुहोस्</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <header>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
        <div class="profile-circle">
            <img src="https://via.placeholder.com/150">
        </div>
        <h1>नैनकला भजन मण्डली</h1>
        <p>गोदावरी-१, अत्तरिया, कैलाली</p>
    </header>

    <div id="admin-panel" class="hidden" style="background:#ffecec; padding:10px; border:2px dashed red;">
        <h3>Admin Panel</h3>
        <button class="btn btn-add" onclick="addRule()">नयाँ नियम +</button>
        <input type="file" id="media-in" accept="image/*" class="hidden" onchange="uploadPhoto(this)">
        <button class="btn btn-save" onclick="document.getElementById('media-in').click()">फोटो थप्नुहोस्</button>
    </div>

    <section>
        <div class="section-title">आचारसंहिता</div>
        <div id="rules-display"></div>
    </section>

    <section>
        <div class="section-title">मिडिया ग्यालरी</div>
        <div id="gallery-grid"></div>
    </section>
</div>

<script>
    // लगइन फङ्सन
    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === 'admin' && p === 'admin123') {
            localStorage.setItem('userRole', 'admin');
            location.reload();
        } else if(u === 'user' && p === 'user123') {
            localStorage.setItem('userRole', 'user');
            location.reload();
        } else {
            alert("मिलेन!");
        }
    }

    // लगआउट फङ्सन
    function logout() {
        localStorage.removeItem('userRole');
        location.reload();
    }

    // फोटो अपलोड र सेभ (LocalStorage प्रयोग गरेर)
    function uploadPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgTag = `<img src="${e.target.result}">`;
                document.getElementById('gallery-grid').insertAdjacentHTML('beforeend', imgTag);
                
                // ब्राउजरमा सेभ गर्ने
                let savedImgs = localStorage.getItem('galleryData') || "";
                localStorage.setItem('galleryData', savedImgs + imgTag);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // नियम थप्ने र सेभ गर्ने
    function addRule() {
        const val = prompt("नयाँ नियम लेख्नुहोस्:");
        if(val) {
            const ruleTag = `<div class="rule-item">🔹 ${val}</div>`;
            document.getElementById('rules-display').insertAdjacentHTML('beforeend', ruleTag);
            
            let savedRules = localStorage.getItem('rulesData') || "";
            localStorage.setItem('rulesData', savedRules + ruleTag);
        }
    }

    // पेज लोड हुँदा डाटा देखाउने
    window.onload = function() {
        const role = localStorage.getItem('userRole');
        if(role) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            if(role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            
            // सेभ भएको डाटा लोड गर्ने
            document.getElementById('gallery-grid').innerHTML = localStorage.getItem('galleryData') || "";
            document.getElementById('rules-display').innerHTML = localStorage.getItem('rulesData') || "नियमहरू उपलब्ध छैनन्।";
        }
    }
</script>

</body>
</html>
