<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नैनकला भजन मण्डली</title>
    <style>
        :root { --orange: #FF9933; --red: #FF0000; --gold: #FFD700; --bg: #FFF5E1; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg); margin: 0; text-align: center; }
        .hidden { display: none; }
        header { background: var(--orange); color: white; padding: 20px; border-bottom: 5px solid var(--gold); position: relative; }
        .profile-circle { width: 140px; height: 140px; margin: 10px auto; border-radius: 50%; border: 4px solid white; overflow: hidden; background: #fff; cursor: pointer; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        section { background: white; margin: 15px auto; padding: 20px; width: 90%; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section-title { background: var(--gold); padding: 8px; margin-bottom: 15px; font-weight: bold; border-radius: 5px; }
        
        /* नियमको नेपाली नम्बरिङ */
        #rules-list { counter-reset: rule-counter; text-align: left; list-style: none; padding: 0; }
        .rule-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
        .rule-item::before { 
            counter-increment: rule-counter; 
            content: counter(rule-counter, devanagari) ". "; 
            font-weight: bold; min-width: 25px;
        }
        .rule-text { flex-grow: 1; border: none; outline: none; font-size: 16px; background: transparent; padding: 5px; }

        .member-card { background: #fff; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-radius: 8px; }
        .member-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        .member-card img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
        
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-add { background: #28a745; } .btn-save { background: #007bff; } .btn-logout { background: #dc3545; position: absolute; right: 10px; top: 10px; }
        .btn-edit { background: #ffc107; color: black; } .btn-delete { background: #ff4444; font-size: 11px; padding: 5px 8px; }
        
        #gallery-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .media-box { position: relative; border: 2px solid var(--gold); border-radius: 8px; overflow: hidden; background: #000; }
        .media-box img, .media-box video { width: 140px; display: block; }
        .media-del-btn { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 5px; font-size: 10px; }
        
        .pdf-item { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-left: 5px solid var(--red); border-radius: 4px; text-align: left; }
    </style>
</head>
<body>

<div id="login-screen" style="padding: 80px 20px; background: var(--orange); color: white; min-height: 100vh;">
    <div class="profile-circle"><img id="grandma-login" src="https://via.placeholder.com/150"></div>
    <h2>नैनकला भजन मण्डली</h2>
    <input type="text" id="username" placeholder="Username" style="padding:12px; margin:8px; border-radius:5px; width:80%; border:none;"><br>
    <input type="password" id="password" placeholder="Password" style="padding:12px; margin:8px; border-radius:5px; width:80%; border:none;"><br>
    <button class="btn btn-save" style="width:85%; padding: 15px;" onclick="checkLogin()">भित्र जानुहोस्</button>
</div>

<div id="main-content" class="hidden">
    <header>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
        <div class="profile-circle" id="main-grandma-div">
            <img id="grandma-main" src="https://via.placeholder.com/150">
        </div>
        <input type="file" id="grandma-upload" class="hidden" onchange="changeGrandmaPhoto(this)">
        <h1>नैनकला भजन मण्डली</h1>
        <p>गोदावरी-१, अत्तरिया, कैलाली</p>
    </header>

    <div id="admin-panel" class="hidden" style="background:#fff; border:2px solid red; margin:15px; padding:15px; border-radius:10px;">
        <button id="edit-btn" class="btn btn-edit" onclick="toggleEdit(true)">Edit Content (परिवर्तन गर्नुहोस्)</button>
        <button id="save-btn" class="btn btn-save hidden" onclick="confirmSave()">Save All Changes (सेभ गर्नुहोस्)</button>
        
        <div id="edit-tools" class="hidden" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
            <button class="btn btn-add" onclick="addRuleLine()">नयाँ नियम +</button>
            <button class="btn btn-add" onclick="addMember('leader')">पदाधिकारी +</button>
            <button class="btn btn-add" onclick="addMember('member')">सदस्य +</button>
            <button class="btn btn-add" onclick="document.getElementById('pdf-in').click()">PDF कार्यक्रम +</button>
            <button class="btn btn-edit" style="background:#555; color:white;" onclick="changeCreds()">ID/PW फेर्नुहोस्</button>
        </div>
        <input type="file" id="pdf-in" accept="application/pdf" class="hidden" onchange="upPdf(this)">
    </div>

    <section>
        <div class="section-title">आचारसंहिता</div>
        <ul id="rules-list"></ul>
    </section>

    <section>
        <div class="section-title">कार्यक्रमहरू (PDF)</div>
        <div id="pdf-list"></div>
    </section>

    <section>
        <div class="section-title">पदाधिकारी तथा सदस्यहरू</div>
        <div id="leader-list"></div>
        <div id="member-list"></div>
    </section>

    <section>
        <div class="section-title">मिडिया ग्यालरी</div>
        <div style="margin-bottom:15px;">
            <button class="btn btn-save" style="background:#6f42c1" onclick="document.getElementById('img-in').click()">फोटो +</button>
            <button class="btn btn-save" style="background:#6f42c1" onclick="document.getElementById('vid-in').click()">भिडियो +</button>
            <button class="btn btn-save" style="background:#6f42c1" onclick="document.getElementById('aud-in').click()">अडियो +</button>
        </div>
        <input type="file" id="img-in" accept="image/*" class="hidden" onchange="upMedia(this, 'img')">
        <input type="file" id="vid-in" accept="video/*" class="hidden" onchange="upMedia(this, 'vid')">
        <input type="file" id="aud-in" accept="audio/*" class="hidden" onchange="upMedia(this, 'aud')">
        <div id="gallery-display"></div>
    </section>
</div>

<script>
    const storage = localStorage;
    let isEdit = false;

    // लगइन विवरण
    function getCreds() {
        return JSON.parse(storage.getItem('siteCreds')) || { adminU:'admin', adminP:'admin123', userU:'user', userP:'user123' };
    }

    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const c = getCreds();
        if(u === c.adminU && p === c.adminP) { storage.setItem('role', 'admin'); location.reload(); }
        else if(u === c.userU && p === c.userP) { storage.setItem('role', 'user'); location.reload(); }
        else alert("Username वा Password मिलेन!");
    }

    function logout() { storage.removeItem('role'); location.reload(); }

    // एडमिन मोड कन्ट्रोल
    function toggleEdit(status) {
        isEdit = status;
        document.getElementById('edit-btn').classList.add('hidden');
        document.getElementById('save-btn').classList.remove('hidden');
        document.getElementById('edit-tools').classList.remove('hidden');
        document.querySelectorAll('.btn-delete').forEach(b => b.classList.remove('hidden'));
        document.querySelectorAll('.media-del-btn').forEach(b => b.classList.remove('hidden'));
        document.querySelectorAll('.rule-text').forEach(i => i.readOnly = false);
    }

    function changeCreds() {
        const c = getCreds();
        const au = prompt("New Admin Username:", c.adminU);
        const ap = prompt("New Admin Password:", c.adminP);
        const uu = prompt("New User Username:", c.userU);
        const up = prompt("New User Password:", c.userP);
        if(au && ap && uu && up) {
            storage.setItem('siteCreds', JSON.stringify({ adminU:au, adminP:ap, userU:uu, userP:up }));
            alert("विवरण सुरक्षित भयो!");
        }
    }

    function changeGrandmaPhoto(input) {
        if(!isEdit) return;
        const r = new FileReader();
        r.onload = e => {
            document.getElementById('grandma-main').src = e.target.result;
            document.getElementById('grandma-login').src = e.target.result;
        };
        r.readAsDataURL(input.files[0]);
    }

    function addRuleLine(text = "") {
        const li = document.createElement('li');
        li.className = "rule-item";
        li.innerHTML = `
            <input type="text" class="rule-text" value="${text}" placeholder="नयाँ नियम यहाँ लेख्नुहोस्..." ${isEdit ? '' : 'readonly'}>
            <button class="btn btn-delete ${isEdit ? '' : 'hidden'}" onclick="this.parentElement.remove()">हटाउनुहोस्</button>
        `;
        document.getElementById('rules-list').appendChild(li);
    }

    function addMember(type) {
        const n = prompt("नाम लेख्नुहोस्:");
        const p = prompt("पद लेख्नुहोस्:");
        if(!n) return;
        const fIn = document.createElement('input'); fIn.type='file'; fIn.accept='image/*';
        fIn.onchange = function() {
            const r = new FileReader();
            r.onload = e => renderMember(type, n, p, e.target.result);
            r.readAsDataURL(this.files[0]);
        };
        fIn.click();
    }

    function renderMember(type, n, p, img) {
        const html = `
            <div class="member-card">
                <div class="member-info"><img src="${img}"><div><strong>${n}</strong><br><small>${p}</small></div></div>
                <button class="btn btn-delete ${isEdit ? '' : 'hidden'}" onclick="this.parentElement.remove()">हटाउनुहोस्</button>
            </div>`;
        document.getElementById(type + '-list').insertAdjacentHTML('beforeend', html);
    }

    function upMedia(input, type) {
        const r = new FileReader();
        r.onload = e => {
            let h = `<div class="media-box">`;
            if(type==='img') h += `<img src="${e.target.result}">`;
            else if(type==='vid') h += `<video src="${e.target.result}" controls></video>`;
            else if(type==='aud') h += `<div style="width:140px; padding:10px; background:#fff;"><audio src="${e.target.result}" controls style="width:120px;"></audio></div>`;
            h += `<button class="media-del-btn" onclick="this.parentElement.remove(); savePublicData();">हटाउनुहोस्</button></div>`;
            document.getElementById('gallery-display').insertAdjacentHTML('beforeend', h);
            savePublicData();
        };
        r.readAsDataURL(input.files[0]);
    }

    function upPdf(input) {
        const h = `<div class="pdf-item">📄 ${input.files[0].name} <button class="btn btn-delete ${isEdit ? '' : 'hidden'}" onclick="this.parentElement.remove()">हटाउनुहोस्</button></div>`;
        document.getElementById('pdf-list').insertAdjacentHTML('beforeend', h);
    }

    function confirmSave() {
        savePublicData();
        alert("सबै कुरा सुरक्षित गरियो!");
        location.reload();
    }

    function savePublicData() {
        storage.setItem('p_grandma', document.getElementById('grandma-main').src);
        const rules = Array.from(document.querySelectorAll('.rule-text')).map(i => i.value);
        storage.setItem('p_rules_json', JSON.stringify(rules));
        storage.setItem('p_leaders', document.getElementById('leader-list').innerHTML);
        storage.setItem('p_members', document.getElementById('member-list').innerHTML);
        storage.setItem('p_pdf', document.getElementById('pdf-list').innerHTML);
        storage.setItem('p_gallery', document.getElementById('gallery-display').innerHTML);
    }

    window.onload = function() {
        const role = storage.getItem('role');
        const gImg = storage.getItem('p_grandma');
        if(gImg) { document.getElementById('grandma-login').src = gImg; document.getElementById('grandma-main').src = gImg; }
        
        const rules = JSON.parse(storage.getItem('p_rules_json') || '[]');
        if(rules.length) rules.forEach(r => addRuleLine(r)); else addRuleLine("नियम १...");

        document.getElementById('leader-list').innerHTML = storage.getItem('p_leaders') || "";
        document.getElementById('member-list').innerHTML = storage.getItem('p_members') || "";
        document.getElementById('pdf-list').innerHTML = storage.getItem('p_pdf') || "";
        document.getElementById('gallery-display').innerHTML = storage.getItem('p_gallery') || "";

        if(role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if(role === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('main-grandma-div').onclick = () => { if(isEdit) document.getElementById('grandma-upload').click(); };
            }
        }
    };
</script>
</body>
</html>
